name: Build macOS

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS App
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Build macOS app (arm64)
        env:
          APPLE_SIGNING_IDENTITY: "-"
        run: |
          cargo_bin="$(rustup which cargo)"
          rustc_bin="$(rustup which rustc)"
          export CARGO="$cargo_bin"
          export RUSTC="$rustc_bin"
          export PATH="$(dirname "$cargo_bin"):$HOME/.cargo/bin:$PATH"
          "$CARGO" metadata --manifest-path src-tauri/Cargo.toml --no-deps --format-version 1 >/dev/null
          npm run tauri build -- --target aarch64-apple-darwin --bundles app,dmg

      - name: List bundle output
        run: find src-tauri/target/aarch64-apple-darwin/release/bundle -type f | sort

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kokoro-Engine-macos-dmg
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          retention-days: 30

      - name: Upload APP artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kokoro-Engine-macos-app
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Kokoro\ Engine.app
          retention-days: 30

      - name: Rename files for release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd src-tauri/target/aarch64-apple-darwin/release/bundle/dmg
          for file in *.dmg; do
            mv "$file" "${file%.dmg}-macos.dmg"
          done

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*-macos.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
