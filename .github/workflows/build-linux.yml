name: Build Linux

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux App
    runs-on: monkci-ubuntu-24.04-32
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libasound2-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            pkg-config \
            file \
            appstream \
            desktop-file-utils \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Build Linux app (x86_64)
        run: npm run tauri build -- --target x86_64-unknown-linux-gnu --bundles deb,rpm
        env:
          RUST_BACKTRACE: 1

      - name: List bundle output
        run: find src-tauri/target/x86_64-unknown-linux-gnu/release/bundle -type f | sort

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kokoro-Engine-linux-deb
          path: src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
          retention-days: 30

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kokoro-Engine-linux-rpm
          path: src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm
          retention-days: 30

      - name: Rename files for release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb
          for file in *.deb; do
            mv "$file" "${file%.deb}-linux.deb"
          done
          cd ../rpm
          for file in *.rpm; do
            mv "$file" "${file%.rpm}-linux.rpm"
          done

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*-linux.deb
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm/*-linux.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
